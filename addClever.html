<html>
    <head>
        <title>Clever Home Page</title>
        <link href="./stylesheets/clevertheme.css" rel="stylesheet"></link>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></link>

    </head>
    <body>

<!--Navigation-->
<div class="navbar">
        <a href="./index.html">Home</a>
        <a href="./addClever.html">Add Games</a>
        <a href="./modifyClever.html">Modify Games</a>
</div>

        <div class="container">
            <div class="form-container">
            <h2>Add Games</h2>
            <form class="form">
                <label for="name">Game Name:</label>
                <input type="text" id="name" placeholder="Enter Name" required>

                <label for="year">Game Release Year:</label>
                <input type="text" id="year" placeholder="Enter Release Year" required>
                
                <label for="studio">Game Studio:</label>
                <input type="text" id="studio" placeholder="Enter Game Studio" required>
                
                <label for="genre">Game Genre:</label>
                <input type="text" id="genre" placeholder="Enter Game Genre" required>
                
                <label for="ign_rating">IGN Rating:</label>
                <input type="text" id="ign_rating" placeholder="Enter IGN Rating" required>
                
                <label for="status">Game Status:</label>
                <select id="status" name="type" required>
                    <option value="">Select Status</option>
                    <option value="Wishlist">Wishlist</option>
                    <option value="Played">Played</option> 
                </select>

                <div class="botton-container">
                    <button type="submit" class="submit-btn">Submit</button>
                </div>
            </form>
        </div>
        </div>

        <!--This is for toast messages-->
        <script src="//ajax.googleapis.com/ajax/libs/jquery/1.11.0/jquery.min.js"></script>
        <script src="//netdna.bootstrapcdn.com/bootstrap/3.2.0/js/bootstrap.min.js"></script>
        <script src="/js/query.toaster.js"></script>

        <!--This is for the post message handling-->
        <script src="./js/postClever.js"></script>

    </body>
</html>
